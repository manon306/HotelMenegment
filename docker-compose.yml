version: '3.8'

services:
  # 1. قاعدة البيانات
  mysql-db:
    image: mysql:8.4.8
    container_name: mysql-db
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: Hotel
    networks:
      - hotel-network

  # 2. يوريكا سيرفر
  eureka-service:
    image: hotelmanagement-eureka-service:latest
    container_name: eureka-service
    ports:
      - "8761:8761"
    networks:
      - hotel-network

  # 3. خدمة المستخدم
  user-service:
    image: hotelmanagement-user-service:latest
    container_name: user-service
    develop:
      watch : 
        - action : rebuild
          path : ./UserService/src
        - action : sync
          path : ./UserService/pom.yaml
          target : /app/pom.yaml
    ports:
      - "8081:8081"
    depends_on:
      - mysql-db
      - eureka-service
    environment:
      # هذه الإعدادات ستطغى على الملف الموجود داخل الـ JAR وتضمن الاتصال
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/Hotel?createDatabaseIfNotExist=true
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-service:8761/eureka
    networks:
      - hotel-network
  booking-service:
    build: ./BookingService
    container_name: booking-service
    ports:
      - "8083:8083"
    depends_on:
      - mysql-db
      - eureka-service
    environment:
      # هذه الإعدادات ستطغى على الملف الموجود داخل الـ JAR وتضمن الاتصال
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/Hotel?createDatabaseIfNotExist=true
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-service:8761/eureka
    networks:
      - hotel-network
  room-service:
    build: ./RoomService
    container_name: Room-service
    ports:
      - "8082:8082"
    develop:
      watch : 
        - action : rebuild
          path : ./RoomService/src
        - action : sync
          path : ./RoomService/pom.yaml
          target : /app/pom.yaml
    depends_on:
      - mysql-db
      - eureka-service
    environment:
      # هذه الإعدادات ستطغى على الملف الموجود داخل الـ JAR وتضمن الاتصال
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/Hotel?createDatabaseIfNotExist=true
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-service:8761/eureka
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - hotel-network
  notification-service:
    build: ./NotificationService
    container_name: notification-service
    ports:
      - "8086:8086"
    depends_on:
      - mysql-db
      - eureka-service
    environment:
      # هذه الإعدادات ستطغى على الملف الموجود داخل الـ JAR وتضمن الاتصال
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/Hotel?createDatabaseIfNotExist=true
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-service:8761/eureka
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - hotel-network
  review-service:
    build: ./REVIEWSERVICE
    container_name: review-service
    ports:
      - "8084:8084"
    depends_on:
      - mysql-db
      - eureka-service
    environment:
      # هذه الإعدادات ستطغى على الملف الموجود داخل الـ JAR وتضمن الاتصال
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/Hotel?createDatabaseIfNotExist=true
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-service:8761/eureka
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - hotel-network
  payment-service:
    build: ./PaymentService
    container_name: Payment-service
    ports:
      - "8085:8085"
    depends_on:
      - mysql-db
      - eureka-service
    environment:
      # هذه الإعدادات ستطغى على الملف الموجود داخل الـ JAR وتضمن الاتصال
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/Hotel?createDatabaseIfNotExist=true
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-service:8761/eureka
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - hotel-network
  apigateway-service:
    build: ./APIGateway
    container_name: apigateway-service
    ports:
      - "8080:8080"
    depends_on:
      - mysql-db
      - eureka-service
    environment:
      # هذه الإعدادات ستطغى على الملف الموجود داخل الـ JAR وتضمن الاتصال
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/Hotel?createDatabaseIfNotExist=true
      - EUREKA_CLIENT_SERVICE_URL_DEFAULTZONE=http://eureka-service:8761/eureka
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=root
    networks:
      - hotel-network

networks:
  hotel-network:
    driver: bridge