spring:
  application:
    name: ROOM-SERVICE
  datasource:
    url: jdbc:mysql://mysql-db:3306/Hotel?createDatabaseIfNotExist=true
    username: root
    password: root
    hikari:
      initialization-fail-timeout: 0
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
server:
  port: 8082

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: http://eureka-service:8761/eureka
      # http://hotelmanagement-eureka-service-1:8761/eureka
