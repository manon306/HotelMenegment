spring:
  application:
    name: API-GATEWAY # يفضل تكون capital letters مع dashes

  cloud:
    gateway:
      routes:
        # User Service
        - id: user-service
          uri: lb://USER-SERVICE
          predicates:
            - Path=/api/auth/**,/api/users/**
          filters:
            - StripPrefix=1

        - id: room-service
          uri: lb://ROOM-SERVICE
          predicates:
            - Path=/api/rooms/**,/api/wishlist/**
          filters:
            - StripPrefix=1
        # Booking Service
        - id: booking-service
          uri: lb://BOOKING-SERVICE
          predicates:
            - Path=/api/bookings/**
          filters:
            - StripPrefix=1
        # Payment Service
        - id: payment-service
          uri: lb://PAYMENT-SERVICE
          predicates:
            - Path=/api/payments/**, /api/invoices/**
          filters:
            - StripPrefix=1

        # Notification Service
        - id: notification-service
          uri: lb://NOTIFICATION-SERVICE
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1
        # Review Service
        - id: review-service
          uri: lb://REVIEW-SERVICE
          predicates:
            - Path=/api/reviews/**
          filters:
            - StripPrefix=1
      globalcors:
        add-to-simple-url-handler-mapping: true
        corsConfigurations:
          "[/**]":
            allowedOrigins:
              - "http://localhost:5173"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials, RETAIN_FIRST
      # default-filters:
      #   - RemoveResponseHeader=Access-Control-Allow-Origin
      #   - RemoveResponseHeader=Access-Control-Allow-Credentials
      #   - DedupeResponseHeader=Access-Control-Allow-Origin, RETAIN_FIRST
      #   - DedupeResponseHeader=Access-Control-Allow-Credentials, RETAIN_FIRST

server:
  port: 8080

eureka:
  client:
    service-url:
      defaultZone: http://eureka-service:8761/eureka
      # //http://hotelmanagement-eureka-service-1:8761/eureka

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
